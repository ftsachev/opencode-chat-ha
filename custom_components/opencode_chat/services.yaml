send_message:
  name: Send message
  description: Send a message to an OpenCode Chat session and get a response.
  fields:
    message:
      name: Message
      description: The message to send.
      required: true
      example: "Turn on the living room lights"
      selector:
        text:
    session_id:
      name: Session ID
      description: Session to send the message to. If empty, creates a new session.
      required: false
      selector:
        text:
